# render.yaml — Blueprint for Bookaholic Mexicana
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: booka
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: booka-db
          property: connectionString
      - key: IG_ACCESS_TOKEN
        sync: false
      - key: IG_USER_ID
        sync: false
      - key: AMAZON_AFFILIATE_TAG
        value: bookaholicmx-20
      - key: SITE_URL
        value: https://bookaholicmexicana.com
      - key: ADMIN_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.6"

databases:
  - name: booka-db
    plan: free
